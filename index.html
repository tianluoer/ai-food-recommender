<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🍔 AI 外卖推荐 — 饭饭</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #FF6B35; --orange-light: #FFF3E0; --green: #26A69A;
      --text: #333; --text-light: #999; --bg: #FFF3E0; --white: #FFF;
    }
    body {
      font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100dvh;
      -webkit-tap-highlight-color: transparent; overflow-x: hidden;
    }
    .app {
      max-width: 500px; margin: 0 auto; min-height: 100dvh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px 20px;
    }
    .page {
      width: 100%; display: flex; flex-direction: column; align-items: center;
      animation: slideIn 0.45s cubic-bezier(0.16, 1, 0.3, 1); text-align: center;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 欢迎页 */
    .welcome-emoji { font-size: 72px; margin-bottom: 16px; animation: bounce 2s ease-in-out infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    .welcome h2 { font-size: 26px; color: var(--orange); margin-bottom: 8px; }
    .welcome p  { font-size: 15px; color: var(--text-light); margin-bottom: 32px; line-height: 1.7; }
    .btn-start {
      padding: 16px 56px; border: none; border-radius: 36px;
      background: linear-gradient(135deg, #FF6B35, #FF8A50);
      color: #fff; font-size: 19px; font-weight: 700; cursor: pointer;
      box-shadow: 0 6px 20px rgba(255,107,53,0.35); transition: transform .15s;
    }
    .btn-start:hover{transform:scale(1.05)} .btn-start:active{transform:scale(0.95)}

    /* 进度 */
    .progress-wrap {
      width: 100%; display: flex; align-items: center; gap: 10px; margin-bottom: 32px;
    }
    .progress-track { flex: 1; height: 6px; background: #E0E0E0; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #FF6B35, #FF8F5E); border-radius: 3px; transition: width 0.4s ease; }
    .progress-num { font-size: 13px; color: var(--text-light); white-space: nowrap; }

    /* 问题 */
    .q-emoji { font-size: 52px; margin-bottom: 12px; }
    .q-text { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 28px; line-height: 1.5; max-width: 360px; min-height: 32px; }

    /* 选项 */
    .options { width: 100%; display: flex; flex-direction: column; gap: 10px; }
    .options.animate-in .opt-btn { animation: optSlideUp 0.35s ease backwards; }
    .options.animate-in .opt-btn:nth-child(1){animation-delay:0s}
    .options.animate-in .opt-btn:nth-child(2){animation-delay:.06s}
    .options.animate-in .opt-btn:nth-child(3){animation-delay:.12s}
    .options.animate-in .opt-btn:nth-child(4){animation-delay:.18s}
    .options.animate-in .opt-btn:nth-child(5){animation-delay:.24s}
    @keyframes optSlideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

    .opt-btn {
      width: 100%; padding: 16px 20px; border: 2px solid #FFD4BF; border-radius: 16px;
      background: var(--white); color: var(--text); font-size: 16px; text-align: left;
      cursor: pointer; font-family: inherit; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: all 0.18s; display: flex; align-items: center; gap: 10px;
    }
    .opt-btn:hover { border-color: var(--orange); background: #FFF6F0; transform: translateX(4px); }
    .opt-btn:active { background: var(--orange); color: #fff; border-color: var(--orange); transform: scale(0.97); }
    .opt-label {
      width: 32px; height: 32px; border-radius: 50%; background: var(--orange);
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; flex-shrink: 0;
    }
    .opt-btn:active .opt-label { background: #fff; color: var(--orange); }

    /* 辅助按钮栏 */
    .sub-bar { width: 100%; display: flex; gap: 8px; margin-top: 14px; }
    .sub-btn {
      flex: 1; min-width: 72px; padding: 11px 8px; border: 2px dashed #CCC; border-radius: 14px;
      background: transparent; color: #999; font-size: 13px; text-align: center;
      cursor: pointer; font-family: inherit; transition: all .15s;
    }
    .sub-btn:hover { background: #fafafa; }
    .sub-btn.refresh { border-color: #FFB088; color: #FF6B35; }
    .sub-btn.refresh:hover { background: #FFF6F0; }

    /* 其他输入 */
    .other-input {
      width: 100%; padding: 12px 16px; border: 2px solid #FFD4BF; border-radius: 14px;
      font-size: 15px; outline: none; font-family: inherit;
    }
    .other-input:focus { border-color: #FF6B35; }
    .other-row { display: flex; gap: 8px; margin-top: 8px; }
    .other-row button { flex: 1; padding: 10px; border-radius: 14px; font-size: 14px; cursor: pointer; font-family: inherit; }
    .btn-cancel { border: 2px solid #CCC; background: transparent; color: #666; }
    .btn-confirm { border: none; background: #FF6B35; color: #fff; }

    /* 加载 */
    .loading-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .loading-dots { display: flex; gap: 8px; }
    .loading-dots span { width: 10px; height: 10px; background: var(--orange); border-radius: 50%; animation: dotBounce 1.2s infinite; }
    .loading-dots span:nth-child(2){animation-delay:.2s}
    .loading-dots span:nth-child(3){animation-delay:.4s}
    @keyframes dotBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-12px)} }
    .loading-text { font-size: 15px; color: var(--text-light); }

    /* 推荐 */
    .rec-card {
      width: 100%; background: var(--white); border-radius: 24px;
      padding: 32px 24px; text-align: center; box-shadow: 0 6px 30px rgba(0,0,0,0.08);
      animation: slideIn 0.55s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .rec-emoji { font-size: 64px; margin-bottom: 16px; animation: bounce 1.5s ease-in-out infinite; }
    .rec-dish { font-size: 22px; font-weight: 700; color: var(--orange); margin-bottom: 4px; }
    .rec-cuisine { font-size: 15px; color: var(--text-light); margin-bottom: 16px; }
    .rec-reason { font-size: 15px; color: #666; line-height: 1.6; margin-bottom: 8px; }
    .rec-fun { font-size: 14px; color: var(--text-light); font-style: italic; margin-bottom: 24px; }
    .btn-retry {
      padding: 14px 40px; border: none; border-radius: 28px;
      background: var(--green); color: #fff; font-size: 16px; font-weight: 600;
      cursor: pointer; box-shadow: 0 4px 14px rgba(38,166,154,0.3); transition: transform .15s;
    }
    .btn-retry:hover{transform:scale(1.05)} .btn-retry:active{transform:scale(0.95)}

    /* 错误 */
    .error-bar {
      width: 100%; background: #EF5350; color: #fff; padding: 12px; text-align: center;
      font-size: 14px; border-radius: 12px; margin-bottom: 16px; animation: slideIn .3s ease;
    }
    .hidden { display: none !important; }
    @media (max-width: 380px) {
      .app { padding: 20px 14px; }
      .q-text { font-size: 18px; }
      .opt-btn { padding: 14px 16px; font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="app" id="app"></div>

  <script>
    const app = document.getElementById('app');
    let messages = [];
    let isLoading = false;

    function render(el) { app.innerHTML = ''; app.appendChild(el); }
    function el(tag, attrs = {}) {
      const e = document.createElement(tag);
      Object.entries(attrs).forEach(([k, v]) => { if (k === 'class') e.className = v; else e[k] = v; });
      return e;
    }
    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
    function pickEmoji(n) { return ['🤔','🌶️','🥘','🥩','🥬','🍚','🔥','💰','👤','🧋'][Math.min(n, 10)] || '🤔'; }

    // ── 欢迎页 ──
    function showWelcome() {
      const page = el('div', { class: 'page' });
      page.innerHTML = `
        <div class="welcome-emoji">🍽️</div>
        <h2>今天吃什么？</h2>
        <p>饭饭帮你决定！<br>回答 10 道选择题就好～</p>
        <button class="btn-start">🎯 开始推荐</button>
      `;
      page.querySelector('.btn-start').addEventListener('click', () => startChat());
      render(page);
    }

    async function startChat() { await send('开始推荐'); }

    // ── 发送消息 ──
    async function send(content) {
      if (isLoading) return;
      isLoading = true;
      messages.push({ role: 'user', content });

      showLoading();

      try {
        const resp = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages }),
        });
        if (!resp.ok) throw new Error('服务器错误 ' + resp.status);
        const data = await resp.json();
        if (!data.success) throw new Error(data.error || '未知错误');

        messages.push({ role: 'assistant', content: data.content });

        if (data.isComplete) {
          showRecommendation(data.recommendation, data.round);
        } else {
          showQuestion(data.content, data.options || [], data.round);
        }
      } catch (err) {
        showError(err.message);
      } finally {
        isLoading = false;
      }
    }

    // ── 问题页（打字机效果） ──
    function showQuestion(question, options, round) {
      const page = el('div', { class: 'page' });

      // 进度条
      const prog = el('div', { class: 'progress-wrap' });
      prog.innerHTML = `
        <div class="progress-track"><div class="progress-fill" style="width:${(round/10)*100}%"></div></div>
        <span class="progress-num">${Math.min(round, 10)}/10</span>
      `;
      page.appendChild(prog);

      // emoji
      const qEmoji = el('div', { class: 'q-emoji' });
      qEmoji.textContent = pickEmoji(round);
      page.appendChild(qEmoji);

      // 问题文字（打字机）
      const qt = el('div', { class: 'q-text' });
      page.appendChild(qt);

      // 选项（先隐藏）
      const optsWrap = el('div', { class: 'options' });
      optsWrap.style.opacity = '0';
      options.forEach((opt, i) => {
        const btn = el('button', { class: 'opt-btn' });
        btn.innerHTML = `<span class="opt-label">${String.fromCharCode(65+i)}</span> ${esc(opt.replace(/^[A-E][.、．) ]\s*/, ''))}`;
        btn.addEventListener('click', () => send(opt));
        optsWrap.appendChild(btn);
      });
      page.appendChild(optsWrap);

      // 底部三按钮：换一批 / 不想要 / 其他
      const bar = el('div', { class: 'sub-bar' });
      bar.id = 'subBar';

      const makeBtn = (html, cls, fn) => {
        const b = el('button', { class: 'sub-btn ' + cls });
        b.innerHTML = html;
        b.addEventListener('click', fn);
        return b;
      };
      bar.appendChild(makeBtn('🔄 换一批', 'refresh', () => send('换一批')));
      bar.appendChild(makeBtn('🚫 不想要', '', () => send('不想要这个')));
      bar.appendChild(makeBtn('💬 其他', '', () => showOtherInput()));
      page.appendChild(bar);

      render(page);

      // 打字机
      const chars = [...question];
      let i = 0;
      function tick() {
        if (i < chars.length) {
          qt.textContent += chars[i];
          i++;
          setTimeout(tick, /[，。！？、\n]/.test(chars[i-1]) ? 80 : 30);
        } else {
          optsWrap.style.transition = 'opacity 0.3s';
          optsWrap.style.opacity = '1';
          optsWrap.classList.add('animate-in');
        }
      }
      tick();
    }

    // ── 「其他」输入 ──
    function showOtherInput() {
      const bar = document.getElementById('subBar');
      if (!bar) return;
      bar.innerHTML = '';

      const input = el('input', { class: 'other-input', type: 'text', placeholder: '输入你想吃的...', maxLength: '100' });
      bar.appendChild(input);

      const row = el('div', { class: 'other-row' });
      const cancel = el('button', { class: 'btn-cancel' });
      cancel.textContent = '取消';
      cancel.addEventListener('click', () => send('跳过'));
      const confirm = el('button', { class: 'btn-confirm' });
      confirm.textContent = '确定';
      confirm.addEventListener('click', () => { const v = input.value.trim(); if (v) send(v); });
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter' && input.value.trim()) send(input.value.trim()); });
      row.appendChild(cancel);
      row.appendChild(confirm);
      bar.appendChild(row);
      setTimeout(() => input.focus(), 100);
    }

    // ── 加载 ──
    function showLoading() {
      const page = el('div', { class: 'page loading-wrap' });
      page.innerHTML = `
        <div class="loading-dots"><span></span><span></span><span></span></div>
        <div class="loading-text">饭饭正在思考...</div>
      `;
      render(page);
    }

    // ── 推荐 ──
    function showRecommendation(rec, round) {
      const page = el('div', { class: 'page' });
      const card = el('div', { class: 'rec-card' });
      card.innerHTML = `
        <div class="rec-emoji">🍕</div>
        <div class="rec-dish">${esc(rec?.dish || '今日精选')}</div>
        <div class="rec-cuisine">${esc(rec?.cuisine || '')}</div>
        <div class="rec-reason">💡 ${esc(rec?.reason || '根据你的口味精心推荐')}</div>
        <div class="rec-fun">✨ ${esc(rec?.funFact || '希望你吃得开心！')}</div>
        <button class="btn-retry">🔄 再来一次</button>
      `;
      card.querySelector('.btn-retry').addEventListener('click', () => location.reload());
      page.appendChild(card);
      render(page);
    }

    // ── 错误 ──
    function showError(msg) {
      messages.pop();
      const page = el('div', { class: 'page' });
      page.innerHTML = `
        <div class="error-bar">😥 ${esc(msg)}</div>
        <button class="btn-start" style="font-size:15px;padding:12px 32px">🔄 重试</button>
      `;
      page.querySelector('.btn-start').addEventListener('click', () => {
        send(messages[messages.length - 1]?.content || '继续');
      });
      render(page);
    }

    showWelcome();
  </script>
</body>
</html>
